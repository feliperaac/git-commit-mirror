# Conexão com o banco de dados Postgres usando as variáveis do Docker
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configurações do Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# Configurações da EvolutionAPI lidas do ambiente
evolution.api.url=${EVOLUTION_API_URL}
evolution.api.instance=${EVOLUTION_API_INSTANCE}
evolution.api.key=${EVOLUTION_API_KEY}
evolution.api.group.id=${EVOLUTION_GROUP_ID}